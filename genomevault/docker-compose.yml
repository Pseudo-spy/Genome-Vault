version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: gv-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: genomevault

  ipfs:
    image: ipfs/kubo:latest
    container_name: gv-ipfs
    restart: unless-stopped
    volumes:
      - ipfs_data:/data/ipfs
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    environment:
      IPFS_PROFILE: server

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gv-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - ipfs
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/genomevault
      JWT_SECRET: ${JWT_SECRET}
      BLOCKCHAIN_RPC: ${BLOCKCHAIN_RPC}
      BACKEND_PRIVATE_KEY: ${BACKEND_PRIVATE_KEY}
      IPFS_API_URL: http://ipfs:5001
      GENOMIC_SERVICE_URL: http://genomic:8000
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}

  genomic:
    build:
      context: ./genomic-service
      dockerfile: Dockerfile
    container_name: gv-genomic
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api}
        NEXT_PUBLIC_CHAIN_ID: ${NEXT_PUBLIC_CHAIN_ID:-80001}
    container_name: gv-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo_data:
  ipfs_data:
